---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: tailscale-source
  namespace: flux-system
spec:
  interval: 12h
  url: https://github.com/tailscale/tailscale.git
  ref:
    # renovate: datasource=docker depName=tailscale/k8s-operator
    tag: v1.98.4
  ignore: |
    # exclude all
    /*
    # include manifests file
    !/cmd/k8s-operator/deploy/manifests/operator.yaml
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tailscale
  namespace: flux-system
spec:
  interval: 30m
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: tailscale-source
  patches:
  - target:
      kind: Namespace
      name: tailscale
    patch: |-
      - op: add
        path: /metadata/labels/pod-security.kubernetes.io~1enforce
        value: privileged
      - op: add
        path: /metadata/labels/pod-security.kubernetes.io~1audit
        value: privileged
      - op: add
        path: /metadata/labels/pod-security.kubernetes.io~1warn
        value: privileged
  # Add the auth secrets
  - target:
      kind: Deployment
      name: operator
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        # renovate: datasource=docker depName=tailscale/k8s-operator
        value: tailscale/k8s-operator:v1.98.4
  - target:
      kind: Secret
      name: operator-oauth
    patch: |-
      - op: replace
        path: /stringData/client_id
        value: ${TAILSCALE_CLIENT_ID}
      - op: replace
        path: /stringData/client_secret
        value: ${TAILSCALE_CLIENT_SECRET}