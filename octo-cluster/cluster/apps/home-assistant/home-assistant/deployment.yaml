---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-assistant
  labels:
    app: home-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      initContainers:
        - name: configure-http-proxy
          image: "alpine:3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b"
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              CONFIG=/config/configuration.yaml
              if grep -qF "10.244.0.0/16" "$CONFIG" 2>/dev/null; then
                echo "Correct trusted_proxies already configured; skipping."
                exit 0
              fi
              if grep -q "trusted_proxies:" "$CONFIG" 2>/dev/null; then
                echo "Replacing wrong subnet in trusted_proxies..."
                sed -i 's/\(- \)[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\/[0-9][0-9]*/\110.244.0.0\/16/' "$CONFIG"
                echo "Done."
                exit 0
              fi
              if grep -q "^http:" "$CONFIG" 2>/dev/null; then
                echo "WARNING: http section exists but lacks trusted_proxies; configure manually."
                exit 0
              fi
              printf '\nhttp:\n  use_x_forwarded_for: true\n  trusted_proxies:\n    - 10.244.0.0/16\n' >> "$CONFIG"
              echo "Added http proxy config."
          volumeMounts:
            - name: ha-config-root
              mountPath: /config
        - name: install-hacs
          image: "alpine:3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b"
          env:
            - name: HACS_VERSION
              # renovate: datasource=github-releases depName=hacs/integration
              value: "2.0.5"
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              installed=$(awk -F'"' '/"version"/{print $4; exit}' /config/custom_components/hacs/manifest.json 2>/dev/null || echo "")
              if [ "$installed" = "$HACS_VERSION" ]; then
                echo "HACS $${HACS_VERSION} already installed; skipping."
                exit 0
              fi
              echo "Installing HACS $${HACS_VERSION}..."
              apk add --no-cache curl unzip >/dev/null
              mkdir -p /config/custom_components/hacs
              tmp=$(mktemp -d)
              curl -fsSL --max-time 60 -o "$${tmp}/hacs.zip" \
                "https://github.com/hacs/integration/releases/download/$${HACS_VERSION}/hacs.zip"
              unzip -q -o "$${tmp}/hacs.zip" -d /config/custom_components/hacs
              rm -rf "$${tmp}"
              echo "HACS $${HACS_VERSION} installed."
          volumeMounts:
            - name: ha-config-root
              mountPath: /config
      containers:
        - name: home-assistant-app
          image: "ghcr.io/home-assistant/home-assistant:2026.6.3"
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: null
          envFrom:
            - configMapRef:
                name: home-assistant-config
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
          resources: {}
          livenessProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 0
            failureThreshold: 30
            timeoutSeconds: 1
            periodSeconds: 5
          volumeMounts:
            - name: ha-config-root
              mountPath: /config
      restartPolicy: Always
      volumes:
        - name: ha-config-root
          persistentVolumeClaim:
            claimName: home-assistant-config
