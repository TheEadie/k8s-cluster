---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zitadel-postgresql
  namespace: zitadel
spec:
  interval: 5m
  chart:
    spec:
      chart: postgresql
      version: "16.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 5m
  values:
    image:
      registry: docker.io
      repository: bitnamilegacy/postgresql
      tag: "17.6.0"
    auth:
      database: zitadel
      username: zitadel
      password: "${ZITADEL_DB_PASSWORD}"
      postgresPassword: "${ZITADEL_DB_ADMIN_PASSWORD}"
    primary:
      persistence:
        enabled: true
        storageClass: "longhorn"
        size: 8Gi
