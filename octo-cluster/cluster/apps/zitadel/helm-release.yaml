---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zitadel
  namespace: zitadel
spec:
  interval: 5m
  chart:
    spec:
      chart: zitadel
      version: 10.0.2
      sourceRef:
        kind: HelmRepository
        name: zitadel
        namespace: flux-system
      interval: 5m
  values:
    replicaCount: 1
    zitadel:
      masterkey: "${ZITADEL_MASTERKEY}"
      configmapConfig:
        ExternalSecure: true
        ExternalDomain: "identity.${SECRET_DOMAIN}"
        ExternalPort: 443
        TLS:
          Enabled: false
    postgresql:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/postgresql
        tag: 17.6.0
      auth:
        database: zitadel
        username: zitadel
        password: "${ZITADEL_DB_PASSWORD}"
        postgresPassword: "${ZITADEL_DB_ADMIN_PASSWORD}"
      primary:
        persistence:
          enabled: true
          storageClass: "longhorn"
          size: 8Gi
      volumePermissions:
        image:
          registry: docker.io
          repository: bitnamilegacy/os-shell
          tag: "12-debian-12"
