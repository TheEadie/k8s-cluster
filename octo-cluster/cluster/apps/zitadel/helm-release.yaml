---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zitadel
  namespace: zitadel
spec:
  interval: 5m
  install:
    remediation:
      retries: -1
  chart:
    spec:
      chart: zitadel
      version: 10.0.4
      sourceRef:
        kind: HelmRepository
        name: zitadel
        namespace: flux-system
      interval: 5m
  values:
    replicaCount: 1
    zitadel:
      masterkey: "${ZITADEL_MASTERKEY}"
      configmapConfig:
        ExternalSecure: true
        ExternalDomain: "identity.${SECRET_DOMAIN}"
        ExternalPort: 443
        TLS:
          Enabled: false
        FirstInstance:
          Org:
            Name: "Family"
            Human:
              UserName: "david"
              FirstName: "David"
              LastName: "Eadie"
              Password: "${ZITADEL_ADMIN_PASSWORD}"
              PasswordChangeRequired: false
        Database:
          Postgres:
            Host: zitadel-postgresql
            Port: 5432
            Database: zitadel
            User:
              Username: zitadel
              SSL:
                Mode: disable
            Admin:
              Username: postgres
              SSL:
                Mode: disable
      secretConfig:
        Database:
          Postgres:
            User:
              Password: "${ZITADEL_DB_PASSWORD}"
            Admin:
              Password: "${ZITADEL_DB_ADMIN_PASSWORD}"
    postgresql:
      enabled: false
