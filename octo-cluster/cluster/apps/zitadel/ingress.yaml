apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    traefik.ingress.kubernetes.io/service.serversscheme: h2c
  name: zitadel
  namespace: zitadel
spec:
  ingressClassName: traefik
  rules:
    - host: "identity.${SECRET_DOMAIN}"
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: zitadel
                port:
                  number: 8080
  tls:
    - hosts:
        - identity.${SECRET_DOMAIN}
      secretName: zitadel-tls
