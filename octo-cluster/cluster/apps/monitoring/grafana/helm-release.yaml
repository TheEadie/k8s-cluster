---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: grafana
      version: 10.5.15
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 5m
  values:
    sidecar:
      datasources:
        enabled: true
        label: grafana_datasource
      dashboards:
        enabled: true
        label: grafana_dashboard
    # OAuth credentials are sourced from the grafana-oauth Secret via env vars
    # rather than grafana.ini. Flux postBuild substitution does a text round-trip
    # that coerces the bare 18-digit ${GRAFANA_OAUTH_CLIENT_ID} into a float64,
    # losing precision. A secretKeyRef is a structured reference, so it is never
    # scalar-coerced. client_secret lives alongside it to keep both in one place.
    envValueFrom:
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
        secretKeyRef:
          name: grafana-oauth
          key: client_id
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
        secretKeyRef:
          name: grafana-oauth
          key: client_secret
    grafana.ini:
      server:
        root_url: "https://grafana.${SECRET_DOMAIN}"
      auth:
        disable_login_form: true
      auth.generic_oauth:
        enabled: true
        name: Zitadel
        scopes: "openid profile email urn:zitadel:iam:org:project:roles"
        auth_url: "https://identity.${SECRET_DOMAIN}/oauth/v2/authorize"
        token_url: "https://identity.${SECRET_DOMAIN}/oauth/v2/token"
        api_url: "https://identity.${SECRET_DOMAIN}/oidc/v1/userinfo"
        use_pkce: true
        auto_login: false
        allow_sign_up: true
        role_attribute_strict: true
        role_attribute_path: >-
          contains(keys("urn:zitadel:iam:org:project:roles"), 'grafana:admin') && 'Admin' ||
          contains(keys("urn:zitadel:iam:org:project:roles"), 'grafana:editor') && 'Editor' ||
          contains(keys("urn:zitadel:iam:org:project:roles"), 'grafana:viewer') && 'Viewer'
