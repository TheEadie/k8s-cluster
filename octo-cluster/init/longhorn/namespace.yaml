# Longhorn runs privileged Pods (host paths, iSCSI, kernel mounts). Talos
# enforces the Pod Security "baseline" profile by default, which would reject
# them — so the longhorn-system namespace is labelled "privileged".
#
# Apply this AFTER kubectl apply -f longhorn.yaml. Longhorn's manifest includes
# its own bare Namespace with no labels — applying ours first and then Longhorn's
# manifest will strip these labels via kubectl apply's 3-way merge.
apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
