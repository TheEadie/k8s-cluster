---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  chart:
    spec:
      chart: traefik
      version: 40.0.0
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  interval: 5m
  releaseName: traefik
  values:
    service:
      annotations:
        metallb.io/loadBalancerIPs: "${NGINX_IP}"
    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik
    providers:
      kubernetesIngress:
        enabled: true
      kubernetesCRD:
        enabled: true
    ingressRoute:
      dashboard:
        enabled: false
