---
apiVersion: v1
kind: Service
metadata:
  name: traefik-tailscale
  namespace: traefik
  labels:
    app: traefik
spec:
  selector:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/instance: traefik-traefik
  ports:
    - appProtocol: http
      name: http
      port: 80
      protocol: TCP
      targetPort: web
    - appProtocol: https
      name: https
      port: 443
      protocol: TCP
      targetPort: websecure
  type: LoadBalancer
  loadBalancerClass: tailscale
