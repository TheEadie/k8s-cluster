---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-assistant
  labels:
    app: home-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      initContainers:
        - name: install-hacs
          image: "alpine:3.20"
          env:
            - name: HACS_VERSION
              # renovate: datasource=github-releases depName=hacs/integration
              value: "2.0.5"
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              installed=$(awk -F'"' '/"version"/{print $4; exit}' /config/custom_components/hacs/manifest.json 2>/dev/null || echo "")
              if [ "$installed" = "$HACS_VERSION" ]; then
                echo "HACS ${HACS_VERSION} already installed; skipping."
                exit 0
              fi
              echo "Installing HACS ${HACS_VERSION}..."
              apk add --no-cache curl unzip >/dev/null
              mkdir -p /config/custom_components/hacs
              tmp=$(mktemp -d)
              curl -fsSL -o "${tmp}/hacs.zip" \
                "https://github.com/hacs/integration/releases/download/${HACS_VERSION}/hacs.zip"
              unzip -q -o "${tmp}/hacs.zip" -d /config/custom_components/hacs
              rm -rf "${tmp}"
              echo "HACS ${HACS_VERSION} installed."
          volumeMounts:
            - name: ha-config-root
              mountPath: /config
      containers:
        - name: home-assistant-app
          image: "ghcr.io/home-assistant/home-assistant:2026.5.4"
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: null
          envFrom:
            - configMapRef:
                name: home-assistant-config
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
          resources: {}
          livenessProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 0
            failureThreshold: 30
            timeoutSeconds: 1
            periodSeconds: 5
          volumeMounts:
            - name: ha-config-root
              mountPath: /config
      restartPolicy: Always
      volumes:
        - name: ha-config-root
          persistentVolumeClaim:
            claimName: home-assistant-config
