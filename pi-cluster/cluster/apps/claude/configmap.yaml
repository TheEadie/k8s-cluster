apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-config
  namespace: claude
data:
  entrypoint.sh: |
    #!/bin/bash
    set -e

    # Install .NET SDK if not already present (persisted on NFS volume)
    if [ ! -f "$HOME/.dotnet/dotnet" ]; then
      curl -fsSL https://dot.net/v1/dotnet-install.sh | bash -s -- --channel 10.0 --install-dir "$HOME/.dotnet"
    fi

    # Install/update Claude Code
    npm install -g @anthropic-ai/claude-code

    # Sync skills from dotfiles (sparse checkout of claude/ directory)
    DOTFILES_DIR=$HOME/.dotfiles-sparse
    if [ -d "$DOTFILES_DIR/.git" ]; then
      git -C "$DOTFILES_DIR" pull --ff-only
    else
      git clone --filter=blob:none --sparse --depth=1 "https://github.com/theeadie/.dotfiles" "$DOTFILES_DIR"
      git -C "$DOTFILES_DIR" sparse-checkout set claude
    fi
    mkdir -p "$HOME/.claude"
    for d in "$DOTFILES_DIR/claude/*/"; do
      ln -sfn "$d" "$HOME/.claude/$(basename $d)"
    done

    # Skip onboarding prompt
    echo '{"hasCompletedOnboarding": true, "theme": "dark", "bypassPermissionsModeAccepted": true, "projects": {"/workspace": {"hasTrustedProjectFolder": true, "hasTrustDialogAccepted": true}}}' > "$HOME/.claude.json"

    # Start Claude Code with remote control
    exec claude \
      --remote-control \
      --name "k8s-cluster" \
      --dangerously-skip-permissions
  gitconfig: |
    [credential "https://github.com"]
      helper = "!f() { echo username=x-access-token; echo password=$GITHUB_TOKEN; }; f"
