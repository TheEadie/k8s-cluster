apiVersion: v1
kind: ConfigMap
metadata:
  name: zeroclaw-config
  namespace: zeroclaw
data:
  config.toml: |
    api_key = "${ZEROCLAW_OPENROUTER_API_KEY}"
    default_provider = "openrouter"

    [channels_config.discord]
    bot_token = "${ZEROCLAW_DISCORD_BOT_TOKEN}"
    allowed_users = ["${ZEROCLAW_DISCORD_USER_ID}"]
