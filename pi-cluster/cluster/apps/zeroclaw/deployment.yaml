apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw
  namespace: zeroclaw
  labels:
    app: zeroclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zeroclaw
  template:
    metadata:
      labels:
        app: zeroclaw
    spec:
      volumes:
        - name: zeroclaw-data
          persistentVolumeClaim:
            claimName: zeroclaw-data
        - name: zeroclaw-config
          configMap:
            name: zeroclaw-config
        - name: git-bin
          emptyDir: {}
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      initContainers:
        - name: install-git
          image: alpine:3.23
          command:
            - sh
            - -c
            - apk add --no-cache git && cp -a /usr/bin/git /git-bin/ && cp -a /usr/libexec/git-core /git-bin/ && cp -a /usr/lib/libpcre2* /git-bin/ 2>/dev/null; true
          volumeMounts:
            - name: git-bin
              mountPath: /git-bin
      containers:
        - name: zeroclaw
          image: ghcr.io/zeroclaw-labs/zeroclaw:v0.5.9
          args: ["daemon"]
          env:
            - name: ZEROCLAW_CONFIG_DIR
              value: /config
            - name: ZEROCLAW_WORKSPACE
              value: /zeroclaw-data/workspace
            - name: GITHUB_TOKEN
              value: "${ZEROCLAW_GITHUB_TOKEN}"
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/git-bin
          volumeMounts:
            - name: zeroclaw-data
              mountPath: /zeroclaw-data
            - name: zeroclaw-config
              mountPath: /config/config.toml
              subPath: config.toml
            - name: zeroclaw-config
              mountPath: /root/.gitconfig
              subPath: gitconfig
            - name: git-bin
              mountPath: /git-bin
          resources:
            requests:
              cpu: 200m
              memory: 64Mi
            limits:
              cpu: "2"
              memory: 512Mi
