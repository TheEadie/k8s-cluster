apiVersion: v1
kind: PersistentVolume
metadata:
  name: zeroclaw-data
spec:
  storageClassName: ""
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: ${PI_NFS_SERVER_IP}
    path: "/export/Kubernetes/config/zeroclaw"
  mountOptions:
    - nfsvers=3
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zeroclaw-data
  namespace: zeroclaw
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  volumeName: zeroclaw-data
